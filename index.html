<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=snowflake" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
	<!--<h1>Welcome to the Charity Water Game Prototype</h1>-->
	<div class="progress-container">
		<div id="progressBar" class="progress-bar"></div>
	</div>
	<p id="progressText">progress: 0%</p>
    

	<div id="startWindow">
		<h1>
			charity: water
		</h1>
		<h2>
			Drop Dash
		</h2>
		<button id="howButton">How To Play</button>
		<br>
		<button id="startButton">Start</button>
		<br>
		<div>
			<input type="radio" id="easy" name="difficulty" checked>
			<label for="easy">Easy</label> <br>
			<input type="radio" id="hard" name="difficulty">
			<label for="hard">Hard</label> <br>
		</div>

	</div>

	<div id="gameWindow">
		<div id="images"> 
			<img src="img/water.png" alt="circle water drop" id="water">
			<img src="img/ice.png" alt="square ice cube" id="ice">
			<img src="img/icefence.png" alt="square ice cube hitting fence" id="icefence">
			<img src="img/iceblock.png" alt="square ice cube hitting block" id="iceblock">
			<img src="img/iceholes.png" alt="square ice cube going over holes" id="iceholes">
			<img src="img/waterfence.png" alt="water drop going through fence" id="waterfence">
			<img src="img/waterblock.png" alt="water drop going under block" id="waterblock">
			<img src="img/waterholes.png" alt="water drop falling through holes" id="waterholes">
			<!--<img src="img/water-0.png" alt="circle water drop" id="water0">
			<img src="img/water-1.png" alt="circle water drop" id="water1">
			<img src="img/water-2.png" alt="circle water drop" id="water2">-->
			<ul id="imagesList">
			</ul>
		</div>
		<button id="switchButton">
			<span class="material-symbols-outlined">
				snowflake
			</span>
		</button>
	</div>

	<div id="gameOverWindow">
		<p id="gameOverMessage"></p>
		<img src="img/water-can-transparent.png" alt="charity: water jerry can" id="gameOverImage">
		<p id="pointsDisplay">Points:</p>
		<button id="restartButton">Restart</button>
	</div>
	<script src="script.js"></script>

	<footer>
		<a href="https://www.charitywater.org/" target="_blank">
			<img src="img/cw_logo_horizontal.png" alt="charity: water logo" id="footerImage">
		</a>
		<br>
		<a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
	</footer>
</body>
</html>
